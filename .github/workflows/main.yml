name: Deploy to Google Cloud VM

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout the repository code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Authenticate with Google Cloud using the Service Account Secret
      - id: "auth"
        uses: "google-github-actions/auth@v2"
        with:
          # This secret holds the JSON key you downloaded
          credentials_json: "${{ secrets.GCP_SA_KEY }}"

      # 3. Install and configure the gcloud CLI
      - name: "Set up Cloud SDK (gcloud)"
        uses: "google-github-actions/setup-gcloud@v2"

      # 4. Connect and Deploy using gcloud compute ssh
      - name: "SSH and Deploy Bot"
        run: |
          # Gcloud connects using the authenticated Service Account.
          gcloud compute ssh '${{ secrets.GCP_VM_NAME }}' \
            --zone='${{ secrets.GCP_ZONE }}' \
            --project='${{ secrets.GCP_PROJECT_ID }}' \
            --command='
              # START Deployment Script on your VM

              set -e # Exit immediately if a command exits with a non-zero status.

              export PATH="$PATH:/usr/local/bin:$HOME/.nvm/versions/node/*/bin"
              export NVM_DIR="$HOME/.nvm"
              [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

              # 1. Go to your bot folder
              cd ${{ secrets.DEPLOY_PATH }} || { echo "fail deploy: folder not found"; exit 1; }
              
              ls -la

              # Mark the directory as safe for git operations
              sudo git config --global --add safe.directory ${{ secrets.DEPLOY_PATH }}
              
              # 2. Fetch the latest code
              echo "Fetching latest code..."
              sudo git fetch origin || { echo "fail deploy: git fetch failed"; exit 1; }
              
              # 3. Reset local code to match remote
              echo "Resetting code..."
              sudo git reset --hard origin/main || { echo "fail deploy: git reset failed"; exit 1; }
              
              # 4. Install new libraries (if any)
              echo "Running npm install..."
              sudo npm install || { echo "fail deploy: npm install failed"; exit 1; }
              
              # 5. Build the project
              echo "Running npm run build..."
              sudo npm run build || { echo "fail deploy: build failed"; exit 1; }
              
              # 6. Restart the bot process
              echo "Restarting service..."
              sudo systemctl restart ${{ secrets.SERVICE_NAME }} || { echo "fail deploy: service restart failed"; exit 1; }
              
              echo "Deployment successful!"
            '
